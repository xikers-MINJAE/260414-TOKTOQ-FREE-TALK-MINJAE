<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>260414 TOKTOQ FREE TALK 민재</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #ffffff; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
        }

        .feed-container { 
            width: 100%; 
            max-width: 500px; 
            padding: 20px 15px;
            display: flex; 
            flex-direction: column; 
                       gap: 16px; 
        }

        
        .post-card, .roady-card, .reply-card { 
            background: white; 
            border-radius: 16px; 
            border: 2px solid #dbfff5; 
            padding: 18px;
            box-shadow: 0 2px 6px rgba(255, 217, 229, 0.2);
            margin: 0; 
        }

        .roady-card {
            background-color: #ffffff;
            border: 1px solid #e1e4e8;
        }

        .roady-nickname { 
            font-weight: 800; 
            font-size: 13px; 
            color: #666; 
            margin-bottom: 12px; 
            display: block; 
        }

        
        .reply-wrapper {
            display: flex;
            padding-left: 15px; 
        }

        .reply-symbol {
            font-size: 16px;
            color: #ffd9e5;
            font-weight: bold;
            margin-right: 8px;
            margin-top: 12px;
            user-select: none;
        }

        .reply-card {
            flex: 1;
            background-color: #f9fffe;
            border-left: 6px solid #dbfff9; 
        }

        
        .header { 
            display: flex; 
            align-items: center; 
            margin-bottom: 12px;
        }

        .avatar { 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            margin-right: 12px; 
            object-fit: cover;
            border: 1px solid #effffc;
        }

        .name-wrapper { display: flex; flex-direction: column; }
        .nickname { font-weight: 700; font-size: 15px; color: #333; }
        .date { font-size: 11px; color: #aaa; margin-top: 2px; }

        .content { 
            line-height: 1.6; 
            white-space: pre-wrap; 
            font-size: 14px; 
            color: #333; 
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="feed-container">

     <article class="post-card">
        <div class="header">
            <img src="https://image.static.bstage.in/cdn-cgi/image/metadata=none,dpr=1,f=auto,width=40/xikers/profile/159a13d0-d3dd-47f9-81fe-b2e378835f08/5b5a7ef1-d552-4b19-807f-f84216359e37/ori.jpg" class="avatar">
            <div class="name-wrapper">
                <span class="nickname">민재</span>
                <span class="date">2026.04.14 16:50:30</span>
            </div>
        </div>
        <div class="content">이따 7시반에 라이브 놀러올사람🙌</div>
    </article>

</div>

</body>
</html>
